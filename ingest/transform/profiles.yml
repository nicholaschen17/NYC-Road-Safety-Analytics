# Credentials from POSTGRES_* env vars. Defaults match a typical local Docker Postgres
# (compose maps 5432→host). Override in CI/prod or export your real values before `dbt`.
transform:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | as_number }}"
      user: "{{ env_var('POSTGRES_USER', 'postgres') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'postgres') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'postgres') }}"
      schema: raw
      threads: 12
