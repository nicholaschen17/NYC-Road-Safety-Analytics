# docker-compose.yml to cover the 7 services: 
# Postgres w/ PostGIS and DuckDB, React, FastAPI, Ingest, Data, ML, API
services:
  # Crash Data Postgres w/ PostGIS and DuckDB
  postgres:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: crash_data_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - crash_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Expose to host for local debugging only — remove in prod
    ports:
      - "5432:5432"

  # Dagster Postgres for DAGster metadata
  dagster_postgres:
    image: postgres:18
    container_name: dagster_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DAGSTER_PG_USER}
      POSTGRES_PASSWORD: ${DAGSTER_PG_PASSWORD}
      POSTGRES_DB: ${DAGSTER_PG_DB}
    volumes:
      - dagster_postgres_data:/var/lib/postgresql
    networks:
      - crash_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DAGSTER_PG_USER} -d ${DAGSTER_PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dagster_webserver:
    build:
      context: ./ingest
      dockerfile: Dockerfile
    container_name: dagster_webserver
    restart: unless-stopped
    # Dev bind mounts: host files appear under /app immediately, but Python already
    # imported old code in memory. After editing .py, either:
    #   docker compose restart dagster_webserver dagster_daemon
    # or: make -C ingest dagster-restart
    # In the UI try Deployment → reload code locations (may still need restart for some changes).
    volumes:
      - ./ingest/job-orchestrator/src/job_orchestrator:/app/job_orchestrator
      - ./ingest/job-orchestrator/src/dbt_orchestrator:/app/dbt_orchestrator
      - ./ingest/transform:/app/transform
      - ./ingest/job-orchestrator/workspace.yaml:/app/workspace.yaml:ro
      - ./ingest/job-orchestrator/dagster.yaml:/app/dagster.yaml:ro
    entrypoint:
      [
        "dagster-webserver",
        "-h", "0.0.0.0",
        "-p", "3001",
        "-w", "/app/workspace.yaml",
      ]
    environment:
      DAGSTER_HOME: /app
      PYTHONPATH: /app
      DAGSTER_PG_HOST: dagster_postgres
      DAGSTER_PG_PORT: "5432"
      DAGSTER_PG_USER: ${DAGSTER_PG_USER}
      DAGSTER_PG_PASSWORD: ${DAGSTER_PG_PASSWORD}
      DAGSTER_PG_DB: ${DAGSTER_PG_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      NYC_APP_TOKEN: ${NYC_APP_TOKEN}
    ports:
      - "3001:3001"
    networks:
      - crash_net
    depends_on:
      dagster_postgres:
        condition: service_healthy
      postgres:
        condition: service_healthy

  dagster_daemon:
    build:
      context: ./ingest
      dockerfile: Dockerfile
    container_name: dagster_daemon
    restart: unless-stopped
    volumes:
      - ./ingest/job-orchestrator/src/job_orchestrator:/app/job_orchestrator
      - ./ingest/job-orchestrator/src/dbt_orchestrator:/app/dbt_orchestrator
      - ./ingest/transform:/app/transform
      - ./ingest/job-orchestrator/workspace.yaml:/app/workspace.yaml:ro
      - ./ingest/job-orchestrator/dagster.yaml:/app/dagster.yaml:ro
    entrypoint:
      [
        "dagster-daemon", "run",
        "-w", "/app/workspace.yaml",
      ]
    environment:
      DAGSTER_HOME: /app
      PYTHONPATH: /app
      DAGSTER_PG_HOST: dagster_postgres
      DAGSTER_PG_PORT: "5432"
      DAGSTER_PG_USER: ${DAGSTER_PG_USER}
      DAGSTER_PG_PASSWORD: ${DAGSTER_PG_PASSWORD}
      DAGSTER_PG_DB: ${DAGSTER_PG_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      NYC_APP_TOKEN: ${NYC_APP_TOKEN}
    networks:
      - crash_net
    depends_on:
      dagster_postgres:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # FastAPI service
  fastapi:
    profiles:
      - api
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crash_fastapi
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      MODEL_PATH: /artifacts/crash_model.joblib
    volumes:
      - model_artifacts:/artifacts
    ports:
      - "8000:8000"
    networks:
      - crash_net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Vite + React SPA (nginx serving production build)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crash_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - crash_net

  # Potential ML Pipeline service TBD

volumes:
  postgres_data:
  dagster_postgres_data:
  grafana_data:
  parquet_store:
  model_artifacts:
networks:
  crash_net: