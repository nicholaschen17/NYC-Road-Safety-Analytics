name: Pylint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingest

    env:
      # Matches local Makefile / Docker: `from shared.*` and `from ingest_coordination_dagster.*`
      PYTHONPATH: ${{ github.workspace }}/ingest:${{ github.workspace }}/ingest/dagster

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: ingest/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pylint

      - name: Run Pylint
        run: |
          # Lint application code only (never venv / site-packages).
          # --errors-only: fail on fatal/syntax/import issues; relax style until you tune .pylintrc.
          pylint --errors-only --recursive=y \
            ingest_scripts \
            shared \
            db \
            dagster \
            tests
